<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primavera Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
      color: white;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding-top: 50px;
    }

    h1 {
      text-align: center;
      font-size: clamp(38px, 7vw, 72px);
      color: #7dd3fc;
      margin: 0;
      font-weight: 900;
    }

    .subtitle {
      text-align: center;
      margin-top: 10px;
      color: #94a3b8;
      font-size: 16px;
    }

    .grid {
      margin-top: 36px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(125, 211, 252, 0.35);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .label {
      color: #dbeafe;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .num {
      margin-top: 14px;
      font-size: 64px;
      line-height: 1;
      color: #7dd3fc;
      font-weight: 900;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      text-align: center;
      color: #38bdf8;
      font-size: 13px;
    }

    .panel {
      margin-top: 30px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(125, 211, 252, 0.25);
      border-radius: 24px;
      padding: 24px;
    }

    .panel h2 {
      margin: 0 0 16px;
      color: #7dd3fc;
      font-size: 24px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    input, select, button {
      width: 100%;
      border: 1px solid rgba(125, 211, 252, 0.35);
      background: rgba(15, 23, 42, 0.95);
      color: white;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 14px;
      outline: none;
    }

    button {
      cursor: pointer;
      font-weight: 800;
      background: #0284c7;
      border-color: #38bdf8;
    }

    button:hover {
      background: #0369a1;
    }

    button.danger {
      background: #e11d48;
      border-color: #fb7185;
    }

    button.danger:hover {
      background: #be123c;
    }

    .small {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 10px;
      line-height: 1.5;
    }

    .message {
      margin-top: 14px;
      color: #bae6fd;
      font-size: 14px;
      min-height: 20px;
    }

    @media (max-width: 850px) {
      .grid, .row {
        grid-template-columns: 1fr;
      }

      .wrap {
        padding-top: 20px;
      }

      .card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Primavera Dashboard</h1>
    <div class="subtitle">Roblox server monitor connected to Supabase</div>

    <section class="grid">
      <div class="card">
        <div class="label">Players Online</div>
        <div class="num" id="players">0</div>
      </div>

      <div class="card">
        <div class="label">Servers Active</div>
        <div class="num" id="servers">0</div>
      </div>
    </section>

    <div class="footer" id="lastUpdate">Last update: -</div>
    <div class="status" id="status">Connecting...</div>

    <section class="panel">
      <h2>⚡ Summit Event</h2>

      <div class="row">
        <input id="adminPin" type="password" placeholder="PIN Admin" />

        <select id="eventEnabled">
          <option value="false">Event OFF</option>
          <option value="true">Event ON</option>
        </select>

        <select id="multiplier">
          <option value="1">x1 Normal</option>
          <option value="2">x2 Boost</option>
          <option value="3">x3 Boost</option>
          <option value="5">x5 Boost</option>
          <option value="10">x10 Boost</option>
        </select>

        <input id="eventName" placeholder="Nama event" value="Summit Boost" />
      </div>

      <div class="row">
        <button onclick="saveEvent()">Simpan Summit Event</button>
        <input id="resetReason" placeholder="Alasan reset server" value="Server sedang di-reset oleh admin." />
        <button class="danger" onclick="resetAllServers()">Reset All Server</button>
        <button onclick="loadStats()">Refresh</button>
      </div>

      <div class="small">
        Contoh: Easy Summit 50 x2 jadi 100. Hard Summit 250 x2 jadi 500.
        Reset server akan kick semua player di server aktif.
      </div>

      <div class="message" id="message"></div>
    </section>
  </main>

  <script>
    function setMessage(text) {
      document.getElementById("message").textContent = text || "";
    }

    async function loadStats() {
      const status = document.getElementById("status");

      try {
        const res = await fetch("/.netlify/functions/stats");
        const data = await res.json();

        if (!data.ok) {
          status.textContent = "Error: " + (data.error || "unknown");
          return;
        }

        document.getElementById("players").textContent = data.players ?? 0;
        document.getElementById("servers").textContent = data.servers ?? 0;

        const time = data.created_at
          ? new Date(data.created_at).toLocaleString()
          : "-";

        document.getElementById("lastUpdate").textContent = "Last update: " + time;
        status.textContent = "Online";

        if (data.config) {
          document.getElementById("eventEnabled").value = String(!!data.config.summitEventEnabled);
          document.getElementById("multiplier").value = String(data.config.summitMultiplier || 1);
          document.getElementById("eventName").value = data.config.summitEventName || "Summit Boost";
        }
      } catch (err) {
        status.textContent = "Failed to connect";
        console.error(err);
      }
    }

    async function callAdmin(payload) {
      const res = await fetch("/.netlify/functions/admin", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(payload),
      });

      return await res.json();
    }

    async function saveEvent() {
      setMessage("Menyimpan event...");

      const pin = document.getElementById("adminPin").value;
      const enabled = document.getElementById("eventEnabled").value === "true";
      const multiplier = Number(document.getElementById("multiplier").value || 1);
      const eventName = document.getElementById("eventName").value || "Summit Boost";

      const result = await callAdmin({
        pin,
        action: "set_event",
        enabled,
        multiplier,
        eventName,
      });

      if (!result.ok) {
        setMessage("❌ " + (result.error || "Gagal menyimpan event."));
        return;
      }

      setMessage("✅ Summit event berhasil disimpan.");
      loadStats();
    }

    async function resetAllServers() {
      const confirmReset = confirm("Yakin reset semua server aktif?");
      if (!confirmReset) return;

      setMessage("Mengirim command reset server...");

      const pin = document.getElementById("adminPin").value;
      const reason = document.getElementById("resetReason").value || "Server sedang di-reset oleh admin.";

      const result = await callAdmin({
        pin,
        action: "reset_all",
        reason,
      });

      if (!result.ok) {
        setMessage("❌ " + (result.error || "Gagal reset server."));
        return;
      }

      setMessage("✅ Command reset all server terkirim.");
    }

    loadStats();
    setInterval(loadStats, 5000);
  </script>
</body>
</html>
