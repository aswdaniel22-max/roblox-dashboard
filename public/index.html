<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primavera Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      font-size: clamp(38px, 7vw, 72px);
      color: #7dd3fc;
      margin: 0;
      font-weight: 900;
    }

    .subtitle {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 16px;
    }

    .grid {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .card {
      text-align: left;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(125, 211, 252, 0.35);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .label {
      color: #dbeafe;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .num {
      margin-top: 14px;
      font-size: 64px;
      line-height: 1;
      color: #7dd3fc;
      font-weight: 900;
    }

    .footer {
      margin-top: 28px;
      color: #64748b;
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      color: #38bdf8;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Primavera Dashboard</h1>
    <div class="subtitle">Roblox server monitor connected to Supabase</div>

    <section class="grid">
      <div class="card">
        <div class="label">Players Online</div>
        <div class="num" id="players">0</div>
      </div>

      <div class="card">
        <div class="label">Servers Active</div>
        <div class="num" id="servers">0</div>
      </div>
    </section>

    <div class="footer" id="lastUpdate">Last update: -</div>
    <div class="status" id="status">Connecting...</div>
  </main>

  <script>
    async function loadStats() {
      const status = document.getElementById("status");

      try {
        const res = await fetch("/.netlify/functions/stats");
        const data = await res.json();

        if (!data.ok) {
          status.textContent = "Error: " + (data.error || "unknown");
          return;
        }

        document.getElementById("players").textContent = data.players ?? 0;
        document.getElementById("servers").textContent = data.servers ?? 0;

        const time = data.created_at
          ? new Date(data.created_at).toLocaleString()
          : "-";

        document.getElementById("lastUpdate").textContent = "Last update: " + time;
        status.textContent = "Online";
      } catch (err) {
        status.textContent = "Failed to connect";
        console.error(err);
      }
    }

    loadStats();
    setInterval(loadStats, 5000);
  </script>
</body>
</html>
